<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradientes para simular a foto real -->
    <radialGradient id="faceGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#f4c2a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="scrubsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e7dd;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="maskGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </radialGradient>
    
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Fundo hospitalar suave -->
  <rect width="300" height="400" fill="#f8f9fa" rx="15"/>
  
  <!-- Figura do médico baseada na foto -->
  <g transform="translate(150, 50)" filter="url(#softShadow)">
    
    <!-- Corpo/Scrubs médicos -->
    <rect x="-60" y="120" width="120" height="200" rx="15" fill="url(#scrubsGradient)" stroke="#c3d9df" stroke-width="1"/>
    
    <!-- Braços -->
    <ellipse cx="-70" cy="180" rx="18" ry="60" fill="url(#scrubsGradient)" stroke="#c3d9df" stroke-width="1"/>
    <ellipse cx="70" cy="180" rx="18" ry="60" fill="url(#scrubsGradient)" stroke="#c3d9df" stroke-width="1"/>
    
    <!-- Mãos com luvas -->
    <circle cx="-70" cy="240" r="15" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
    <circle cx="70" cy="240" r="15" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
    
    <!-- Cabeça -->
    <circle cx="0" cy="60" r="45" fill="url(#faceGradient)" stroke="#c49b7a" stroke-width="1"/>
    
    <!-- Cabelo (parcialmente visível) -->
    <path d="M-40 25 Q-35 15 -25 20 Q-10 10 0 15 Q10 10 25 20 Q35 15 40 25 Q35 30 20 28 Q0 25 -20 28 Q-35 30 -40 25" fill="#4a4a4a" opacity="0.8"/>
    
    <!-- Máscara cirúrgica -->
    <ellipse cx="0" cy="75" rx="35" ry="25" fill="url(#maskGradient)" stroke="#e0e0e0" stroke-width="1"/>
    
    <!-- Elásticos da máscara -->
    <path d="M-35 65 Q-50 55 -45 45" stroke="#666" stroke-width="2" fill="none"/>
    <path d="M35 65 Q50 55 45 45" stroke="#666" stroke-width="2" fill="none"/>
    
    <!-- Óculos -->
    <circle cx="-15" cy="50" r="12" fill="none" stroke="#333" stroke-width="2" opacity="0.8"/>
    <circle cx="15" cy="50" r="12" fill="none" stroke="#333" stroke-width="2" opacity="0.8"/>
    <line x1="3" y1="50" x2="-3" y2="50" stroke="#333" stroke-width="2" opacity="0.8"/>
    
    <!-- Reflexo nos óculos -->
    <circle cx="-18" cy="47" r="3" fill="#ffffff" opacity="0.6"/>
    <circle cx="18" cy="47" r="3" fill="#ffffff" opacity="0.6"/>
    
    <!-- Olhos visíveis através dos óculos -->
    <circle cx="-15" cy="50" r="4" fill="#2d3748"/>
    <circle cx="15" cy="50" r="4" fill="#2d3748"/>
    <circle cx="-14" cy="49" r="1" fill="#ffffff"/>
    <circle cx="16" cy="49" r="1" fill="#ffffff"/>
    
    <!-- Sobrancelhas -->
    <path d="M-25 40 Q-15 38 -8 42" stroke="#4a4a4a" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M8 42 Q15 38 25 40" stroke="#4a4a4a" stroke-width="2" fill="none" opacity="0.7"/>
    
    <!-- Gorro cirúrgico -->
    <path d="M-45 30 Q-40 10 -20 5 Q0 0 20 5 Q40 10 45 30 Q40 35 20 32 Q0 30 -20 32 Q-40 35 -45 30" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
    
    <!-- Detalhes do gorro -->
    <path d="M-30 25 Q0 20 30 25" stroke="#64b5f6" stroke-width="1" fill="none" opacity="0.5"/>
    
    <!-- Estetoscópio -->
    <path d="M-25 140 Q-15 150 0 145 Q15 150 25 140" stroke="#2c5282" stroke-width="3" fill="none"/>
    <circle cx="-25" cy="140" r="6" fill="#2c5282"/>
    <circle cx="25" cy="140" r="6" fill="#2c5282"/>
    
    <!-- Crachá de identificação -->
    <rect x="-20" y="160" width="40" height="25" rx="3" fill="#ffffff" stroke="#3182ce" stroke-width="1"/>
    <rect x="-18" y="162" width="36" height="8" rx="1" fill="#3182ce"/>
    <text x="0" y="168" text-anchor="middle" fill="white" font-size="6" font-family="Arial, sans-serif" font-weight="bold">DR. JOÃO VÍTOR</text>
    <text x="0" y="178" text-anchor="middle" fill="#2d3748" font-size="4" font-family="Arial, sans-serif">Coloproctologista</text>
    
    <!-- Instrumentos cirúrgicos no bolso -->
    <rect x="-8" y="130" width="2" height="15" fill="#718096" rx="1"/>
    <rect x="-4" y="128" width="2" height="17" fill="#4a5568" rx="1"/>
    <rect x="0" y="132" width="2" height="13" fill="#2d3748" rx="1"/>
    
  </g>
  
  <!-- Texto profissional -->
  <text x="150" y="370" text-anchor="middle" fill="#2d3748" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Dr. João Vítor Viana</text>
  <text x="150" y="385" text-anchor="middle" fill="#4a5568" font-size="12" font-family="Arial, sans-serif">Coloproctologista - CRM-GO</text>
</svg>